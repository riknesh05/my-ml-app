<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #2a2a3a;
    --accent: #6fffb0;
    --accent2: #ff6b6b;
    --text: #e8e8f0;
    --muted: #6060a0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    background-image: radial-gradient(ellipse at 20% 20%, #1a0a2e 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 80%, #0a1a1a 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header .tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.8;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  h1 span { color: var(--accent2); -webkit-text-fill-color: var(--accent2); }

  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 0.95rem;
    font-family: 'Space Mono', monospace;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 640px;
    margin-bottom: 20px;
  }

  .card-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* DROP ZONE */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .drop-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(111,255,176,0.04) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(111,255,176,0.03);
  }

  .drop-zone:hover::before, .drop-zone.drag-over::before { opacity: 1; }

  .drop-icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
    display: block;
    filter: grayscale(0.3);
  }

  .drop-zone h3 {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .drop-zone p {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .drop-zone input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  .file-chosen {
    margin-top: 16px;
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    color: var(--accent);
    display: none;
    align-items: center;
    gap: 8px;
    justify-content: center;
  }

  .file-chosen.visible { display: flex; }

  /* MODEL SELECTOR */
  .model-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .model-btn {
    padding: 14px 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .model-btn .icon { font-size: 1.2rem; }

  .model-btn:hover {
    border-color: var(--accent);
    background: rgba(111,255,176,0.05);
  }

  .model-btn.selected {
    border-color: var(--accent);
    background: rgba(111,255,176,0.08);
    color: var(--accent);
    box-shadow: 0 0 20px rgba(111,255,176,0.1);
  }

  /* RUN BUTTON */
  .run-btn {
    width: 100%;
    max-width: 640px;
    padding: 18px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }

  .run-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(111,255,176,0.3); }
  .run-btn:active { transform: translateY(0); }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* RESULT */
  .result-card {
    width: 100%;
    max-width: 640px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    display: none;
    margin-top: 20px;
  }

  .result-card.visible { display: block; animation: fadeUp 0.4s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card .card-label { margin-bottom: 16px; }

  .result-card img {
    width: 100%;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .loading-bar {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 16px;
    display: none;
  }

  .loading-bar.active { display: block; }

  .loading-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #00d4ff);
    border-radius: 99px;
    animation: loadSlide 1.5s ease-in-out infinite;
  }

  @keyframes loadSlide {
    0% { width: 0%; margin-left: 0%; }
    50% { width: 60%; margin-left: 20%; }
    100% { width: 0%; margin-left: 100%; }
  }

  .mock-graph {
    background: #0d0d18;
    border-radius: 8px;
    border: 1px solid var(--border);
    height: 280px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
  }

  .mock-graph svg { width: 200px; opacity: 0.9; }

</style>
</head>
<body>

<header>
  <div class="tag">// ML Visualizer</div>
  <h1>Drop. Train. <span>See.</span></h1>
  <p class="subtitle">Upload a CSV → pick a model → get your graph</p>
</header>

<!-- Step 1: CSV Upload -->
<div class="card">
  <div class="card-label">// 01 — Upload Dataset</div>
  <div class="drop-zone" id="dropZone">
    <input type="file" accept=".csv" id="fileInput">
    <span class="drop-icon">📂</span>
    <h3>Drop your CSV here</h3>
    <p>or click to browse — last column = target label</p>
  </div>
  <div class="file-chosen" id="fileChosen">
    <span>✅</span>
    <span id="fileName">dataset.csv</span>
  </div>
</div>

<!-- Step 2: Model Selection -->
<div class="card">
  <div class="card-label">// 02 — Select Model</div>
  <div class="model-grid">
    <button class="model-btn" data-model="random_forest" onclick="selectModel(this)">
      <span class="icon">🌲</span> Random Forest
    </button>
    <button class="model-btn" data-model="decision_tree" onclick="selectModel(this)">
      <span class="icon">🌿</span> Decision Tree
    </button>
    <button class="model-btn" data-model="logistic_regression" onclick="selectModel(this)">
      <span class="icon">📈</span> Logistic Regression
    </button>
    <button class="model-btn" data-model="svm" onclick="selectModel(this)">
      <span class="icon">⚡</span> SVM
    </button>
    <button class="model-btn" data-model="knn" onclick="selectModel(this)">
      <span class="icon">🔵</span> K-Nearest Neighbors
    </button>
    <button class="model-btn" data-model="gradient_boost" onclick="selectModel(this)">
      <span class="icon">🚀</span> Gradient Boosting
    </button>
  </div>
</div>

<!-- Run Button -->
<button class="run-btn" id="runBtn" disabled onclick="runModel()">
  ▶ Run Model
</button>

<!-- Result -->
<div class="result-card" id="resultCard">
  <div class="card-label" id="resultLabel">// Output</div>
  <div class="loading-bar" id="loadingBar"><div class="loading-bar-fill"></div></div>
  <div class="mock-graph" id="mockGraph">
    <svg viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg">
      <!-- Confusion Matrix Mock -->
      <rect x="20" y="20" width="70" height="60" fill="#1e3a2e" stroke="#6fffb0" stroke-width="1.5" rx="4"/>
      <rect x="110" y="20" width="70" height="60" fill="#3a1e1e" stroke="#ff6b6b" stroke-width="1.5" rx="4"/>
      <rect x="20" y="90" width="70" height="60" fill="#3a1e1e" stroke="#ff6b6b" stroke-width="1.5" rx="4"/>
      <rect x="110" y="90" width="70" height="60" fill="#1e3a2e" stroke="#6fffb0" stroke-width="1.5" rx="4"/>
      <text x="55" y="55" text-anchor="middle" fill="#6fffb0" font-size="18" font-family="Space Mono">48</text>
      <text x="145" y="55" text-anchor="middle" fill="#ff6b6b" font-size="18" font-family="Space Mono">4</text>
      <text x="55" y="125" text-anchor="middle" fill="#ff6b6b" font-size="18" font-family="Space Mono">2</text>
      <text x="145" y="125" text-anchor="middle" fill="#6fffb0" font-size="18" font-family="Space Mono">46</text>
      <text x="55" y="16" text-anchor="middle" fill="#888" font-size="8" font-family="Space Mono">Pred 0</text>
      <text x="145" y="16" text-anchor="middle" fill="#888" font-size="8" font-family="Space Mono">Pred 1</text>
      <text x="8" y="55" text-anchor="middle" fill="#888" font-size="7" font-family="Space Mono" transform="rotate(-90,8,55)">Actual 0</text>
      <text x="8" y="125" text-anchor="middle" fill="#888" font-size="7" font-family="Space Mono" transform="rotate(-90,8,125)">Actual 1</text>
    </svg>
    <p style="font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--muted)">Graph will appear here after training</p>
  </div>
</div>

<script>
  let selectedModel = null;
  let fileSelected = false;

  const fileInput = document.getElementById('fileInput');
  const dropZone = document.getElementById('dropZone');
  const runBtn = document.getElementById('runBtn');

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) {
      fileSelected = true;
      document.getElementById('fileName').textContent = fileInput.files[0].name;
      document.getElementById('fileChosen').classList.add('visible');
      checkReady();
    }
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.name.endsWith('.csv')) {
      fileSelected = true;
      document.getElementById('fileName').textContent = f.name;
      document.getElementById('fileChosen').classList.add('visible');
      checkReady();
    }
  });

  function selectModel(btn) {
    document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedModel = btn.dataset.model;
    checkReady();
  }

  function checkReady() {
    runBtn.disabled = !(fileSelected && selectedModel);
  }

 async function runModel() {
  const resultCard = document.getElementById('resultCard');
  const loadingBar = document.getElementById('loadingBar');
  const mockGraph = document.getElementById('mockGraph');
  const resultLabel = document.getElementById('resultLabel');

  resultCard.classList.add('visible');
  loadingBar.classList.add('active');
  mockGraph.style.opacity = '0.3';
  runBtn.disabled = true;
  runBtn.textContent = '⏳ Training...';
  resultLabel.textContent = `// Training ${selectedModel.replace(/_/g,' ')}...`;

  try {
    const formData = new FormData();
    formData.append("file", fileInput.files[0]);
    formData.append("model", selectedModel);

    const res = await fetch("https://5000-m-s-kkb-use1d2-1oiiio54po959-d.us-east1-2.prod.colab.dev/predict", {
      method: "POST",
      body: formData,
    });

    const data = await res.json();

    // Show the returned graph image
    mockGraph.innerHTML = `<img src="data:image/png;base64,${data.image}" style="width:100%;border-radius:8px;">`;
    mockGraph.style.opacity = '1';
    resultLabel.textContent = `// ✅ ${selectedModel.replace(/_/g,' ')} — Output`;

  } catch (err) {
    mockGraph.innerHTML = `<p style="color:#ff6b6b;font-family:monospace;font-size:0.8rem;">❌ Error: ${err.message}</p>`;
    mockGraph.style.opacity = '1';
  }

  loadingBar.classList.remove('active');
  runBtn.disabled = false;
  runBtn.textContent = '▶ Run Model';
}
</script>
</body>
</html>
